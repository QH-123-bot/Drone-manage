# 无人机管理系统 — MySQL 数据源配置（application-mysql.yml）
# 作用：profile=mysql 时的生产/联调数据库配置，切换 profile 即可改用 MySQL 存储无人机数据。
# 功能：配置 Druid 连接池、MySQL 连接串与账号、启动时执行 schema-mysql.sql 建表。

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/drone_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    druid:
      initial-size: 2
      min-idle: 2
      max-active: 20
      test-while-idle: true
      validation-query: SELECT 1
    initialization-mode: always
    schema: classpath:schema-mysql.sql
